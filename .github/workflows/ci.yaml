name: CI

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install uv
        run: pip install uv

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Cache huggingface models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-minilm-v1

      - name: Export models
        run: |
          python scripts/export_model.py
          python scripts/export_minilm.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ runner.os }}-${{ hashFiles('Dockerfile', 'requirements.txt') }}
          restore-keys: |
            buildx-${{ runner.os }}-

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ml-inference-platform-api:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Start stack
        run: docker compose up -d
      
      - name: Wait for API
        run: sleep 30
      
      - name: Show API logs
        run: docker compose logs api

      - name: Health check
        run: curl -f http://localhost:8000/health
      
      - name: Test predict endpoint
        run: |
          curl -f -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"features": [5.1, 3.5, 1.4, 0.2]}'

      - name: Test text endpoint
        run: |
          curl -f -X POST http://localhost:8000/predict/text \
            -H "Content-Type: application/json" \
            -d '{"text": "CI pipeline smoke test"}'

      - name: Tear down stack
        if: always()
        run: docker compose down